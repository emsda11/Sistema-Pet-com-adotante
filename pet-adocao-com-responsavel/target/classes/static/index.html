<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Pets</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header>
        <h1>🐾 Sistema de Adoção de Pets</h1>
        <p>Projeto com Spring Boot, API REST, HTML, Pet e Adotante</p>
    </header>

    <main>
        <h2>Cadastrar Pet</h2>

        <input type="hidden" id="idPet">

        <label>Nome:</label>
        <input type="text" id="nome" placeholder="Ex.: Mel">

        <label>Tipo:</label>
        <input type="text" id="tipo" placeholder="Ex.: Cachorro, Gato">

        <label>Idade:</label>
        <input type="number" id="idade" placeholder="Ex.: 2">

        <button onclick="salvarPet()">Salvar Pet</button>
        <button onclick="limparFormularioPet()">Limpar</button>

        <p id="mensagemPet" class="mensagem"></p>

        <h2>Pets cadastrados</h2>
        <div id="listaPets"></div>

        <hr>

        <h2>Cadastrar Adotante</h2>

        <input type="hidden" id="idAdotante">

        <label>Nome do adotante:</label>
        <input type="text" id="nomeAdotante" placeholder="Ex.: Maria Silva">

        <label>Telefone:</label>
        <input type="text" id="telefoneAdotante" placeholder="Ex.: 84999999999">

        <label>Cidade:</label>
        <input type="text" id="cidadeAdotante" placeholder="Ex.: Natal">

        <label>Pet desejado:</label>
        <select id="idPetDesejado">
            <option value="">Selecione um pet</option>
        </select>

        <button onclick="salvarAdotante()">Salvar Adotante</button>
        <button onclick="limparFormularioAdotante()">Limpar</button>

        <p id="mensagemAdotante" class="mensagem"></p>

        <h2>Adotantes cadastrados</h2>
        <div id="listaAdotantes"></div>
    </main>

    <script src="script.js"></script>

</body>

</html>
